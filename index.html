<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeltXtract™ — Premium Solventless Culture</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #000000;
  --deep: #030308;
  --green: #00ff88;
  --lime: #b7ff00;
  --pink: #ff3fa0;
  --purple: #8a3fff;
  --orange: #ff8c00;
  --gold: #ffd700;
  --cyan: #00e5ff;
  --white: #ffffff;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Rajdhani', sans-serif;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
#cur {
  position: fixed; z-index: 99999;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--lime);
  pointer-events: none;
  transform: translate(-50%,-50%);
  mix-blend-mode: exclusion;
  transition: transform 0.1s;
}
#cur-ring {
  position: fixed; z-index: 99998;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(183,255,0,0.5);
  pointer-events: none;
  transform: translate(-50%,-50%);
  transition: all 0.2s ease;
}
#spotlight {
  position: fixed; z-index: 1;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(183,255,0,0.04) 0%, rgba(138,63,255,0.02) 40%, transparent 70%);
  pointer-events: none;
  transform: translate(-50%,-50%);
  transition: left 0.15s ease, top 0.15s ease;
}

/* ── CANVAS LAYER ── */
#canvas-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* ── DRIP CANVAS ── */
#drip-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 2;
  pointer-events: none;
}

/* ── INTRO OVERLAY ── */
#intro {
  position: fixed; inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── SCANLINE OVERLAY ── */
#scanlines {
  position: fixed; inset: 0; z-index: 50;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  opacity: 0.4;
}

/* ── NOISE GRAIN ── */
#grain {
  position: fixed; inset: 0; z-index: 51;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  animation: grainMove 0.5s steps(2) infinite;
}
@keyframes grainMove {
  0% { transform: translate(0,0); }
  25% { transform: translate(-3px,2px); }
  50% { transform: translate(3px,-2px); }
  75% { transform: translate(-2px,-3px); }
  100% { transform: translate(2px,3px); }
}

/* ── CHROMATIC ABERRATION EDGE ── */
#chroma {
  position: fixed; inset: 0; z-index: 49; pointer-events: none;
  box-shadow:
    inset 0 0 120px rgba(0,0,0,0.8),
    inset 3px 0 30px rgba(255,0,128,0.06),
    inset -3px 0 30px rgba(0,229,255,0.06);
}

/* ── PHASE 0: Total Darkness ── */
#phase-dark {
  position: absolute; inset: 0;
  background: #000;
  z-index: 20;
  opacity: 1;
  transition: opacity 1.5s ease;
}

/* ── PARTICLES ── */
.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
}

/* ── FOG LAYERS ── */
.fog-layer {
  position: absolute;
  width: 200%; height: 200%;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(80px);
  opacity: 0;
  animation: fogDrift linear infinite;
}
@keyframes fogDrift {
  0% { transform: translate(-25%, -25%) rotate(0deg) scale(1); }
  50% { transform: translate(-20%, -30%) rotate(180deg) scale(1.15); }
  100% { transform: translate(-25%, -25%) rotate(360deg) scale(1); }
}

/* ── LOGO AREA ── */
#logo-wrap {
  position: relative;
  z-index: 30;
  text-align: center;
  opacity: 0;
  transform: scale(0.7) translateY(40px);
  transition: opacity 2s cubic-bezier(0.16,1,0.3,1), transform 2s cubic-bezier(0.16,1,0.3,1);
}
#logo-wrap.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
}

#logo-tm-line {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.55rem, 1.2vw, 0.8rem);
  letter-spacing: 0.6em;
  color: rgba(183,255,0,0.7);
  text-transform: uppercase;
  margin-bottom: 0.8rem;
  opacity: 0;
  transform: translateY(10px);
  transition: all 1s ease 0.3s;
}
#logo-tm-line.visible { opacity: 1; transform: translateY(0); }

#logo-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4.5rem, 13vw, 14rem);
  line-height: 0.88;
  letter-spacing: -0.01em;
  position: relative;
  display: inline-block;
}

/* Layered neon glow text effect */
.logo-layer {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}
.logo-base {
  background: linear-gradient(
    160deg,
    #ffffff 0%,
    #e8ffe0 15%,
    var(--lime) 30%,
    #ffffff 45%,
    var(--green) 60%,
    #ffffff 75%,
    var(--lime) 90%,
    #ffffff 100%
  );
  background-size: 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: logoShine 4s ease infinite;
  position: relative;
  z-index: 3;
  filter: drop-shadow(0 0 30px rgba(183,255,0,0.6));
}
@keyframes logoShine {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Glitch duplicate layers */
.logo-glitch-r {
  color: var(--pink);
  opacity: 0;
  animation: glitchR 6s steps(1) infinite;
  mix-blend-mode: screen;
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4.5rem, 13vw, 14rem);
  white-space: nowrap;
}
.logo-glitch-g {
  color: var(--cyan);
  opacity: 0;
  animation: glitchG 6s steps(1) infinite;
  mix-blend-mode: screen;
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4.5rem, 13vw, 14rem);
  white-space: nowrap;
}
@keyframes glitchR {
  0%,92%,100% { opacity: 0; transform: translate(0,0); }
  93% { opacity: 0.5; transform: translate(4px, -2px); }
  95% { opacity: 0; }
  97% { opacity: 0.3; transform: translate(-3px, 1px); }
  99% { opacity: 0; }
}
@keyframes glitchG {
  0%,92%,100% { opacity: 0; transform: translate(0,0); }
  94% { opacity: 0.4; transform: translate(-4px, 2px); }
  96% { opacity: 0; }
  98% { opacity: 0.3; transform: translate(3px, -1px); }
  99.5% { opacity: 0; }
}

/* Reflection shimmer sweep */
#logo-reflection {
  position: absolute;
  top: 0; left: -120%; width: 60%; height: 100%;
  background: linear-gradient(105deg, transparent, rgba(255,255,255,0.08), rgba(183,255,0,0.12), transparent);
  transform: skewX(-15deg);
  animation: reflectionSweep 5s ease-in-out infinite;
  z-index: 4;
  pointer-events: none;
}
@keyframes reflectionSweep {
  0%, 60% { left: -120%; opacity: 0; }
  62% { opacity: 1; }
  80% { left: 160%; opacity: 0; }
  100% { left: 160%; opacity: 0; }
}

/* Liquid pulse ring under logo */
.logo-ring {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 1px solid;
  pointer-events: none;
  animation: ringExpand 3s ease-out infinite;
}
.ring1 { width: 300px; height: 300px; border-color: rgba(183,255,0,0.3); animation-delay: 0s; }
.ring2 { width: 300px; height: 300px; border-color: rgba(138,63,255,0.2); animation-delay: 1s; }
.ring3 { width: 300px; height: 300px; border-color: rgba(255,63,160,0.15); animation-delay: 2s; }
@keyframes ringExpand {
  0% { transform: translate(-50%,-50%) scale(0.3); opacity: 0.8; }
  100% { transform: translate(-50%,-50%) scale(4); opacity: 0; }
}

#logo-tm-sup {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.3em;
  vertical-align: super;
  color: var(--lime);
  -webkit-text-fill-color: var(--lime);
  filter: drop-shadow(0 0 8px var(--lime));
}

/* ── TAGLINE ── */
#tagline-wrap {
  position: relative;
  z-index: 30;
  text-align: center;
  margin-top: 2rem;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 1.5s ease 0.5s, transform 1.5s ease 0.5s;
}
#tagline-wrap.visible { opacity: 1; transform: translateY(0); }

#tagline-main {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(0.7rem, 2.5vw, 1.4rem);
  font-weight: 300;
  letter-spacing: 0.6em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 0.5rem;
  overflow: hidden;
}
#tagline-main .word {
  display: inline-block;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
#tagline-main .word.in { opacity: 1; transform: translateY(0); }

#tagline-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(0.85rem, 2vw, 1.1rem);
  font-weight: 400;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.25);
  font-style: italic;
  opacity: 0;
  transition: opacity 1s ease 1.5s;
}
#tagline-sub.visible { opacity: 1; }

/* ── DIVIDER LINE ── */
#divider {
  width: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--lime), var(--pink), var(--purple), transparent);
  margin: 1.5rem auto;
  transition: width 1.5s cubic-bezier(0.16,1,0.3,1) 0.8s;
  box-shadow: 0 0 12px var(--lime);
  position: relative; z-index: 30;
}
#divider.visible { width: min(600px, 70vw); }

/* ── CTA BUTTONS ── */
#cta-wrap {
  position: relative; z-index: 30;
  display: flex; gap: 1.2rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 2.5rem;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 1s ease 1.2s, transform 1s ease 1.2s;
}
#cta-wrap.visible { opacity: 1; transform: translateY(0); }

.cta-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.6rem, 1.5vw, 0.78rem);
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 1rem 2.5rem;
  border-radius: 3px;
  border: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  text-decoration: none;
}
.cta-btn::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
}
.cta-btn:hover { transform: translateY(-3px); }
.cta-btn:hover::before { opacity: 1; }

.btn-enter {
  background: linear-gradient(135deg, var(--lime) 0%, var(--green) 50%, var(--lime) 100%);
  background-size: 200%;
  color: #000;
  animation: btnGradAnim 3s ease infinite, btnGlow 2s ease-in-out infinite;
}
@keyframes btnGradAnim {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes btnGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(183,255,0,0.4), 0 0 60px rgba(183,255,0,0.15); }
  50% { box-shadow: 0 0 40px rgba(183,255,0,0.7), 0 0 100px rgba(183,255,0,0.25); }
}
.btn-enter::before {
  background: rgba(255,255,255,0.3);
}
.btn-enter:hover {
  box-shadow: 0 0 60px rgba(183,255,0,0.9), 0 0 120px rgba(183,255,0,0.4) !important;
}

.btn-shop {
  background: transparent;
  color: var(--white);
  border: 1px solid rgba(255,63,160,0.5);
  backdrop-filter: blur(10px);
  animation: shopGlow 2.5s ease-in-out infinite 0.5s;
}
@keyframes shopGlow {
  0%, 100% { box-shadow: 0 0 15px rgba(255,63,160,0.2), inset 0 0 15px rgba(255,63,160,0.02); border-color: rgba(255,63,160,0.4); }
  50% { box-shadow: 0 0 35px rgba(255,63,160,0.5), inset 0 0 25px rgba(255,63,160,0.06); border-color: rgba(255,63,160,0.8); }
}
.btn-shop::before { background: rgba(255,63,160,0.1); }
.btn-shop:hover {
  box-shadow: 0 0 50px rgba(255,63,160,0.7) !important;
  border-color: var(--pink) !important;
}

/* ── PRODUCT JARS 3D ── */
#jars-wrap {
  position: fixed;
  inset: 0; z-index: 5;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s ease;
}
#jars-wrap.visible { opacity: 1; }

.jar-3d {
  position: absolute;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  animation: jarFloat linear infinite;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  transform-style: preserve-3d;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.08);
}
.jar-3d::after {
  content: '';
  position: absolute;
  top: 8%; left: 15%;
  width: 35%; height: 25%;
  background: rgba(255,255,255,0.12);
  border-radius: 50%;
  transform: rotate(-25deg);
  filter: blur(3px);
}

@keyframes jarFloat {
  0% { transform: translateY(0px) rotateY(0deg) rotateZ(0deg); }
  25% { transform: translateY(-25px) rotateY(90deg) rotateZ(3deg); }
  50% { transform: translateY(-15px) rotateY(180deg) rotateZ(0deg); }
  75% { transform: translateY(-30px) rotateY(270deg) rotateZ(-3deg); }
  100% { transform: translateY(0px) rotateY(360deg) rotateZ(0deg); }
}

/* ── LIGHT SWEEPS ── */
.light-sweep {
  position: fixed;
  top: -100%; left: -50%;
  width: 200%; height: 200%;
  pointer-events: none;
  opacity: 0;
  z-index: 8;
  animation: sweepAnim 8s ease-in-out infinite;
}
.ls1 {
  background: conic-gradient(from 0deg at 20% 50%, transparent 0deg, rgba(183,255,0,0.04) 20deg, transparent 40deg);
  animation-delay: 0s;
}
.ls2 {
  background: conic-gradient(from 0deg at 80% 30%, transparent 0deg, rgba(255,63,160,0.04) 20deg, transparent 40deg);
  animation-delay: 2s;
}
.ls3 {
  background: conic-gradient(from 0deg at 50% 70%, transparent 0deg, rgba(138,63,255,0.04) 20deg, transparent 40deg);
  animation-delay: 4s;
}
@keyframes sweepAnim {
  0% { opacity: 0; transform: rotate(-30deg); }
  20% { opacity: 1; }
  50% { opacity: 0.5; transform: rotate(30deg); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: rotate(90deg); }
}

/* ── LOADING BAR ── */
#loader {
  position: fixed; inset: 0; z-index: 100;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1.5rem;
}
#loader-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.5em;
  color: rgba(183,255,0,0.4);
  text-transform: uppercase;
  animation: loaderPulse 1.5s ease infinite;
}
@keyframes loaderPulse {
  0%,100% { opacity: 0.3; }
  50% { opacity: 1; }
}
#loader-bar-wrap {
  width: 200px;
  height: 1px;
  background: rgba(255,255,255,0.08);
  position: relative;
  overflow: hidden;
}
#loader-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--lime), var(--green));
  box-shadow: 0 0 10px var(--lime);
  transition: width 0.1s ease;
}
#loader-pct {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.2);
}

/* ── BOTTOM HUD ── */
#hud {
  position: fixed;
  bottom: 2.5rem;
  left: 0; right: 0;
  z-index: 30;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 4%;
  opacity: 0;
  transition: opacity 1.5s ease 1.5s;
}
#hud.visible { opacity: 1; }

.hud-left {
  display: flex; flex-direction: column; gap: 0.3rem;
}
.hud-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}
.hud-val {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.5);
}

.hud-center {
  display: flex; gap: 0.4rem; align-items: center;
}
.hud-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  animation: hudBlink 2s ease infinite;
}
.hd1 { background: var(--lime); animation-delay: 0s; }
.hd2 { background: var(--pink); animation-delay: 0.4s; }
.hd3 { background: var(--purple); animation-delay: 0.8s; }
@keyframes hudBlink {
  0%,100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}

.hud-right {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  color: rgba(183,255,0,0.35);
  text-align: right;
  line-height: 1.8;
}

/* ── CORNER DECORATORS ── */
.corner {
  position: fixed; z-index: 30;
  width: 30px; height: 30px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease 2s;
}
.corner.visible { opacity: 0.5; }
.c-tl { top: 1.5rem; left: 1.5rem; border-top: 1px solid var(--lime); border-left: 1px solid var(--lime); }
.c-tr { top: 1.5rem; right: 1.5rem; border-top: 1px solid var(--lime); border-right: 1px solid var(--lime); }
.c-bl { bottom: 1.5rem; left: 1.5rem; border-bottom: 1px solid var(--lime); border-left: 1px solid var(--lime); }
.c-br { bottom: 1.5rem; right: 1.5rem; border-bottom: 1px solid var(--lime); border-right: 1px solid var(--lime); }

/* ── SKIP ── */
#skip {
  position: fixed; z-index: 200;
  top: 1.5rem; right: 1.5rem;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.2);
  cursor: pointer;
  transition: color 0.3s;
  display: none;
}
#skip:hover { color: rgba(255,255,255,0.5); }

/* ── MAIN SITE (post-intro) ── */
#main-site {
  position: fixed; inset: 0; z-index: 9999;
  background: #070707;
  opacity: 0;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0s;
}
#main-site.entering {
  transition: opacity 1.5s ease;
  opacity: 1;
  pointer-events: auto;
}
#main-site-inner {
  text-align: center;
  font-family: 'Orbitron', sans-serif;
}
</style>
</head>
<body>

<!-- Cursor -->
<div id="cur"></div>
<div id="cur-ring"></div>
<div id="spotlight"></div>

<!-- Overlay effects -->
<div id="scanlines"></div>
<div id="grain"></div>
<div id="chroma"></div>

<!-- Corner decorators -->
<div class="corner c-tl" id="ctl"></div>
<div class="corner c-tr" id="ctr"></div>
<div class="corner c-bl" id="cbl"></div>
<div class="corner c-br" id="cbr"></div>

<!-- Skip button -->
<div id="skip" onclick="skipIntro()">SKIP ↗</div>

<!-- Loader -->
<div id="loader">
  <div id="loader-logo">MeltXtract™</div>
  <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
  <div id="loader-pct">0%</div>
</div>

<!-- BG Canvas -->
<canvas id="canvas-bg"></canvas>

<!-- Drip Canvas -->
<canvas id="drip-canvas"></canvas>

<!-- Light sweeps -->
<div class="light-sweep ls1"></div>
<div class="light-sweep ls2"></div>
<div class="light-sweep ls3"></div>

<!-- Floating Jars -->
<div id="jars-wrap">
  <div class="jar-3d" id="jar1" style="width:100px;height:100px;background:radial-gradient(135deg,rgba(138,63,255,0.7),rgba(255,63,160,0.4));left:6%;top:25%;animation-duration:9s;animation-delay:0s;">🫙</div>
  <div class="jar-3d" id="jar2" style="width:75px;height:75px;background:radial-gradient(135deg,rgba(0,255,136,0.7),rgba(183,255,0,0.4));right:8%;top:35%;animation-duration:11s;animation-delay:2s;">🫙</div>
  <div class="jar-3d" id="jar3" style="width:90px;height:90px;background:radial-gradient(135deg,rgba(255,140,0,0.7),rgba(255,63,160,0.4));left:12%;bottom:25%;animation-duration:13s;animation-delay:1s;">🫙</div>
  <div class="jar-3d" id="jar4" style="width:65px;height:65px;background:radial-gradient(135deg,rgba(255,215,0,0.7),rgba(255,140,0,0.4));right:14%;bottom:30%;animation-duration:10s;animation-delay:3s;">🫙</div>
  <div class="jar-3d" id="jar5" style="width:50px;height:50px;background:radial-gradient(135deg,rgba(0,229,255,0.6),rgba(138,63,255,0.4));left:4%;top:60%;animation-duration:14s;animation-delay:0.5s;">🫙</div>
  <div class="jar-3d" id="jar6" style="width:55px;height:55px;background:radial-gradient(135deg,rgba(255,63,160,0.7),rgba(138,63,255,0.4));right:4%;top:18%;animation-duration:12s;animation-delay:1.5s;">🫙</div>
</div>

  <!-- Fog -->

  <div class="fog-layer" style="background:radial-gradient(ellipse,rgba(255,63,160,0.08),transparent 60%);animation-duration:30s;animation-delay:-10s;top:-30%;left:0%;"></div>
  <div class="fog-layer" style="background:radial-gradient(ellipse,rgba(0,255,136,0.06),transparent 60%);animation-duration:35s;animation-delay:-5s;top:-40%;left:-20%;"></div>

<!-- Main site placeholder -->
<div id="main-site">
  <div id="main-site-inner">
    <div style="font-size:clamp(2rem,8vw,6rem);letter-spacing:0.05em;background:linear-gradient(135deg,#b7ff00,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem;">MeltXtract™</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:0.3em;color:rgba(255,255,255,0.3);text-transform:uppercase;">Premium Solventless Culture</div>
    <div style="margin-top:3rem;font-family:'Rajdhani',sans-serif;font-size:0.85rem;color:rgba(255,255,255,0.2);letter-spacing:0.15em;">[ Full site would continue here ]</div>
  </div>
</div>

<script>
// ── CURSOR ──────────────────────────────────
const cur = document.getElementById('cur');
const curRing = document.getElementById('cur-ring');
const spotlight = document.getElementById('spotlight');
let mx = window.innerWidth/2, my = window.innerHeight/2;
let rx = mx, ry = my;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx + 'px'; cur.style.top = my + 'px';
  spotlight.style.left = mx + 'px'; spotlight.style.top = my + 'px';
});
function animRing() {
  rx += (mx - rx) * 0.14;
  ry += (my - ry) * 0.14;
  curRing.style.left = rx + 'px'; curRing.style.top = ry + 'px';
  requestAnimationFrame(animRing);
}
animRing();

// Cursor scale on interactives
document.querySelectorAll('button,.cta-btn').forEach(el => {
  el.addEventListener('mouseenter', () => { cur.style.transform = 'translate(-50%,-50%) scale(2)'; curRing.style.transform = 'translate(-50%,-50%) scale(0.5)'; curRing.style.borderColor = 'rgba(183,255,0,0.9)'; });
  el.addEventListener('mouseleave', () => { cur.style.transform = 'translate(-50%,-50%) scale(1)'; curRing.style.transform = 'translate(-50%,-50%) scale(1)'; curRing.style.borderColor = 'rgba(183,255,0,0.5)'; });
});

// ── PARALLAX JARS on mouse ───────────────────
const jars = document.querySelectorAll('.jar-3d');
document.addEventListener('mousemove', e => {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const dx = (e.clientX - cx) / cx;
  const dy = (e.clientY - cy) / cy;
  jars.forEach((j, i) => {
    const depth = (i + 1) * 0.4;
    const existing = j.style.transform || '';
    j.style.marginLeft = (dx * depth * 18) + 'px';
    j.style.marginTop = (dy * depth * 10) + 'px';
  });
});

// ── CANVAS BACKGROUND ────────────────────────
const cvs = document.getElementById('canvas-bg');
const ctx = cvs.getContext('2d');
cvs.width = window.innerWidth;
cvs.height = window.innerHeight;
window.addEventListener('resize', () => {
  cvs.width = window.innerWidth;
  cvs.height = window.innerHeight;
});

// Orbs
const orbs = [
  { x: 0.15, y: 0.3, r: 0.35, color: [138,63,255], speed: 0.0008, phase: 0 },
  { x: 0.8, y: 0.2, r: 0.28, color: [255,63,160], speed: 0.0006, phase: 1 },
  { x: 0.5, y: 0.75, r: 0.3, color: [0,255,136], speed: 0.001, phase: 2 },
  { x: 0.7, y: 0.6, r: 0.22, color: [255,140,0], speed: 0.0007, phase: 3 },
  { x: 0.2, y: 0.7, r: 0.2, color: [0,229,255], speed: 0.0009, phase: 4 },
];

// Particles
const particles = [];
for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 0.4,
    vy: -Math.random() * 0.6 - 0.1,
    r: Math.random() * 2.5 + 0.5,
    color: [[183,255,0],[255,63,160],[138,63,255],[255,140,0],[0,255,136],[255,215,0]][Math.floor(Math.random()*6)],
    opacity: Math.random() * 0.6 + 0.1,
    life: Math.random(),
    lifeSpeed: Math.random() * 0.003 + 0.001,
  });
}

let t = 0;
function drawBG() {
  const W = cvs.width, H = cvs.height;
  t += 0.016;

  // Deep black base
  ctx.fillStyle = '#000005';
  ctx.fillRect(0, 0, W, H);

  // Animated orbs
  orbs.forEach(o => {
    const ox = (o.x + Math.sin(t * o.speed * 1000 + o.phase) * 0.1) * W;
    const oy = (o.y + Math.cos(t * o.speed * 800 + o.phase) * 0.08) * H;
    const radius = o.r * Math.min(W, H);
    const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, radius);
    g.addColorStop(0, `rgba(${o.color},0.13)`);
    g.addColorStop(0.5, `rgba(${o.color},0.04)`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ox, oy, radius, 0, Math.PI * 2);
    ctx.fill();
  });

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life += p.lifeSpeed;
    if (p.life > 1) { p.life = 0; p.x = Math.random() * W; p.y = H + 10; }
    const alpha = Math.sin(p.life * Math.PI) * p.opacity;
    ctx.shadowBlur = 6;
    ctx.shadowColor = `rgba(${p.color},0.8)`;
    ctx.fillStyle = `rgba(${p.color},${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
  });

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(183,255,0,0.02)';
  ctx.lineWidth = 1;
  const gs = 80;
  for (let x = 0; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  requestAnimationFrame(drawBG);
}
drawBG();

// ── DRIP CANVAS ──────────────────────────────
const dc = document.getElementById('drip-canvas');
const dctx = dc.getContext('2d');
dc.width = window.innerWidth;
dc.height = window.innerHeight;
window.addEventListener('resize', () => { dc.width = window.innerWidth; dc.height = window.innerHeight; });

const DRIP_COLORS = [
  [183,255,0], [0,255,136], [255,63,160],
  [138,63,255], [255,140,0], [255,215,0], [0,229,255]
];
const drips = [];
let dripsActive = false;

function spawnDrip() {
  const col = DRIP_COLORS[Math.floor(Math.random() * DRIP_COLORS.length)];
  drips.push({
    x: Math.random() * dc.width,
    y: -20,
    w: Math.random() * 10 + 4,
    speed: Math.random() * 2.5 + 1.5,
    len: 0,
    maxLen: Math.random() * 200 + 80,
    color: col,
    alpha: Math.random() * 0.6 + 0.3,
    blob: Math.random() * 12 + 6,
    done: false,
    dripping: true,
  });
}

function drawDrips() {
  dctx.clearRect(0, 0, dc.width, dc.height);
  drips.forEach(d => {
    if (d.dripping) {
      d.len = Math.min(d.len + d.speed, d.maxLen);
      if (d.len >= d.maxLen) d.dripping = false;
    } else {
      d.y += d.speed * 0.3;
      if (d.y > dc.height + 100) d.done = true;
    }

    const y0 = d.y;
    const y1 = d.y + d.len;

    // Drip strand
    const g = dctx.createLinearGradient(d.x, y0, d.x, y1);
    g.addColorStop(0, `rgba(${d.color},0)`);
    g.addColorStop(0.1, `rgba(${d.color},${d.alpha})`);
    g.addColorStop(0.85, `rgba(${d.color},${d.alpha * 0.7})`);
    g.addColorStop(1, `rgba(${d.color},0.1)`);
    dctx.fillStyle = g;
    dctx.shadowColor = `rgba(${d.color},0.5)`;
    dctx.shadowBlur = 8;
    dctx.beginPath();
    dctx.roundRect(d.x - d.w/2, y0, d.w, d.len, d.w/2);
    dctx.fill();

    // Blob at tip
    const bR = d.w/2 + d.blob * (d.len / d.maxLen);
    const bAlpha = d.alpha * 0.8 * Math.min(d.len / 30, 1);
    const bg = dctx.createRadialGradient(d.x, y1, 0, d.x, y1, bR);
    bg.addColorStop(0, `rgba(${d.color},${bAlpha})`);
    bg.addColorStop(0.6, `rgba(${d.color},${bAlpha * 0.4})`);
    bg.addColorStop(1, `rgba(${d.color},0)`);
    dctx.fillStyle = bg;
    dctx.shadowBlur = 15;
    dctx.beginPath();
    dctx.arc(d.x, y1, bR, 0, Math.PI * 2);
    dctx.fill();
    dctx.shadowBlur = 0;
  });

  // Clean done drips
  for (let i = drips.length - 1; i >= 0; i--) {
    if (drips[i].done) drips.splice(i, 1);
  }

  requestAnimationFrame(drawDrips);
}
drawDrips();

// ── LOADER ───────────────────────────────────
const loaderEl = document.getElementById('loader');
const loaderBar = document.getElementById('loader-bar');
const loaderPct = document.getElementById('loader-pct');
let pct = 0;

function runLoader() {
  return new Promise(resolve => {
    const interval = setInterval(() => {
      const jump = Math.random() * 12 + 3;
      pct = Math.min(pct + jump, 100);
      loaderBar.style.width = pct + '%';
      loaderPct.textContent = Math.floor(pct) + '%';
      if (pct >= 100) {
        clearInterval(interval);
        setTimeout(resolve, 300);
      }
    }, 80);
  });
}

// ── INTRO TIMELINE ───────────────────────────
async function runIntro() {
  // Phase 1: Load
  await runLoader();
  loaderEl.style.opacity = '0';
  loaderEl.style.transition = 'opacity 0.8s ease';
  await delay(800);
  loaderEl.style.display = 'none';

  // Phase 2: Pure darkness
  document.getElementById('skip').style.display = 'block';
  await delay(600);

  // Phase 3: Start drips
  dripsActive = true;
  let dripInterval = setInterval(() => { if (dripsActive) spawnDrip(); }, 220);
  await delay(1200);

  // Phase 4: Fog rises (already animating via CSS)
  document.querySelectorAll('.fog-layer').forEach(f => {
    f.style.opacity = '1';
    f.style.transition = 'opacity 3s ease';
  });
  await delay(800);

  // Phase 5: Dark cover lifts
  const dark = document.getElementById('phase-dark');
  dark.style.opacity = '0';
  await delay(1500);

  // Phase 6: Logo appears
  const logoWrap = document.getElementById('logo-wrap');
  logoWrap.classList.add('visible');
  document.getElementById('logo-tm-line').classList.add('visible');
  await delay(600);

  // Phase 7: Jars appear
  document.getElementById('jars-wrap').classList.add('visible');
  await delay(500);

  // Phase 8: Corners
  ['ctl','ctr','cbl','cbr'].forEach(id => document.getElementById(id).classList.add('visible'));
  await delay(400);

  // Phase 9: Divider
  document.getElementById('divider').classList.add('visible');
  await delay(800);

  // Phase 10: Tagline letter by letter
  const taglineEl = document.getElementById('tagline-main');
  const taglineWords = 'PREMIUM SOLVENTLESS CULTURE'.split(' ');
  taglineWords.forEach(w => {
    const s = document.createElement('span');
    s.className = 'word';
    s.textContent = w + '\u00A0';
    taglineEl.appendChild(s);
  });
  document.getElementById('tagline-wrap').classList.add('visible');
  await delay(200);
  const words = taglineEl.querySelectorAll('.word');
  for (let i = 0; i < words.length; i++) {
    await delay(180);
    words[i].classList.add('in');
  }
  await delay(400);
  document.getElementById('tagline-sub').classList.add('visible');
  await delay(600);

  // Phase 11: CTAs
  document.getElementById('cta-wrap').classList.add('visible');
  document.getElementById('hud').classList.add('visible');

  // Slow drips
  clearInterval(dripInterval);
  dripInterval = setInterval(() => { spawnDrip(); }, 1200);

  // HUD extract cycling
  const extracts = ['Live Rosin', 'Hash Rosin', 'Bubble Hash', 'Cold Cure', 'Full Melt', 'Rosin Jam'];
  let ei = 0;
  setInterval(() => {
    ei = (ei + 1) % extracts.length;
    const el = document.getElementById('hud-extract');
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    setTimeout(() => { el.textContent = extracts[ei]; el.style.opacity = '1'; }, 300);
  }, 3000);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function skipIntro() {
  // Jump to end state
  document.getElementById('loader').style.display = 'none';
  document.getElementById('phase-dark').style.opacity = '0';
  document.getElementById('logo-wrap').classList.add('visible');
  document.getElementById('logo-tm-line').classList.add('visible');
  document.getElementById('jars-wrap').classList.add('visible');
  document.getElementById('divider').classList.add('visible');
  document.getElementById('tagline-wrap').classList.add('visible');
  const taglineEl = document.getElementById('tagline-main');
  if (!taglineEl.children.length) {
    'PREMIUM SOLVENTLESS CULTURE'.split(' ').forEach(w => {
      const s = document.createElement('span');
      s.className = 'word in';
      s.textContent = w + '\u00A0';
      taglineEl.appendChild(s);
    });
  }
  document.getElementById('tagline-sub').classList.add('visible');
  document.getElementById('cta-wrap').classList.add('visible');
  document.getElementById('hud').classList.add('visible');
  ['ctl','ctr','cbl','cbr'].forEach(id => document.getElementById(id).classList.add('visible'));
  document.querySelectorAll('.fog-layer').forEach(f => { f.style.opacity='1'; });
  dripsActive = true;
  setInterval(spawnDrip, 800);
}

function enterSite() {
  const ms = document.getElementById('main-site');
  ms.classList.add('entering');
  document.getElementById('intro').style.opacity = '0';
  document.getElementById('intro').style.transition = 'opacity 1s ease';
  document.getElementById('hud').style.opacity = '0';
  ['ctl','ctr','cbl','cbr'].forEach(id => { document.getElementById(id).style.opacity = '0'; });
  document.getElementById('skip').style.display = 'none';
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
  }, 1000);
}

// ── START ────────────────────────────────────
window.addEventListener('load', runIntro);
</script>
