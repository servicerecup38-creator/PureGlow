<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureGlow Smile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:#050507;
  color:white;
}

/* INTRO VIDEO */
#intro {
  position:fixed;
  inset:0;
  z-index:999;
}

#intro video {
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6); /* ASSOMBRI */
}

.intro-content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.intro-content h1 {
  font-size:42px;
  color:#c084fc;
}

.enter-btn {
  margin-top:20px;
  padding:12px 30px;
  border:1px solid #a855f7;
  background:transparent;
  color:white;
}

/* MAIN */
#main {
  display:none;
}

/* HERO */
.hero {
  padding:120px 20px;
  text-align:center;
  background:linear-gradient(#0a0a12,#050507);
}

.hero h1 {
  font-size:38px;
}

.hero span {
  color:#a855f7;
}

.btn {
  margin-top:20px;
  padding:14px 28px;
  background:#a855f7;
  border:none;
  color:white;
  border-radius:6px;
}

/* AVANT APRES */
.before-after {
  padding:60px 20px;
  text-align:center;
}

.before-after img {
  width:100%;
  border-radius:12px;
}

/* PRODUIT */
.product {
  padding:60px 20px;
  text-align:center;
}

.product img {
  width:80%;
  border-radius:12px;
}

.price {
  font-size:28px;
  color:#c084fc;
  margin:20px 0;
}

/* AVIS */
.reviews {
  padding:60px 20px;
}

.review {
  background:#0a0a12;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- INTRO VIDEO -->
<div id="intro">
  <video autoplay muted loop playsinline>
    <source src="https://s33.aconvert.com/convert/p3r68-cdx67/pj5vt-m7lme.webm">
  </video>

  <div class="intro-content">
    <h1>PureGlow</h1>
    <button class="enter-btn" onclick="enter()">ENTRER</button>
  </div>
</div>

<!-- SITE -->
<div id="main">

<section class="hero">
  <h1>Poudre <span>Violette 5D</span></h1>
  <p>Blanchiment instantané dès la première utilisation</p>
  <button class="btn">Commander maintenant</button>
</section>

<section class="before-after">
  <h2>Résultat</h2>
  <img src="https://i.imgur.com/7QZ9Z5G.jpg">
</section>

<section class="product">
  <h2>Notre Produit</h2>
  <img src="https://i.imgur.com/2nCt3Sbl.jpg">
  <div class="price">19,99€</div>
  <button class="btn">Acheter</button>
</section>

<section class="reviews">
  <h2>Avis Clients</h2>

  <div class="review">
    ⭐⭐⭐⭐⭐<br>
    Résultat incroyable en 5 jours !
  </div>

  <div class="review">
    ⭐⭐⭐⭐⭐<br>
    Produit doux et efficace
  </div>

</section>

</div>

<script>
function enter(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";
}
</script>

</body>
</html>
