<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PureGlow Smile</title>

<style>
:root {
  --bg:#020204;
  --bg2:#0a0a12;
  --violet:#7c3aed;
  --neon:#a855f7;
  --glow:#c084fc;
  --white:#ffffff;
  --text:#bfaaff;
}

body {
  margin:0;
  background:var(--bg);
  color:var(--white);
  font-family:Arial, sans-serif;
}

/* INTRO VIDEO */
#intro {
  position:fixed;
  inset:0;
  z-index:999;
  overflow:hidden;
}

#intro video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), black);
}

.intro-content {
  position:absolute;
  z-index:2;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.intro-content h1 {
  font-size:50px;
  background:linear-gradient(90deg,var(--glow),var(--neon));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.intro-btn {
  margin-top:20px;
  padding:12px 30px;
  border:1px solid var(--neon);
  background:transparent;
  color:white;
  cursor:pointer;
}

/* MAIN */
#main {
  opacity:0;
  transition:1s;
}

#main.show {
  opacity:1;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:radial-gradient(circle,var(--violet),black);
}

.hero h2 {
  font-size:60px;
}

.btn {
  padding:15px 35px;
  background:linear-gradient(90deg,var(--violet),var(--neon));
  border:none;
  color:white;
  margin-top:20px;
}

/* SECTION */
.section {
  padding:100px 20px;
  text-align:center;
}

.product {
  max-width:300px;
  margin:auto;
  filter:drop-shadow(0 0 30px var(--neon));
  animation:float 3s infinite;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

</style>
</head>

<body>

<!-- INTRO VIDEO -->
<div id="intro">

  <video autoplay muted loop playsinline>
    <source src="https://s33.aconvert.com/convert/p3r68-cdx67/pj5vt-m7lme.webm" type="video/webm">
  </video>

  <div class="overlay"></div>

  <div class="intro-content">
    <h1>PureGlow</h1>
    <button class="intro-btn" onclick="enter()">ENTRER</button>
  </div>

</div>

<!-- MAIN -->
<div id="main">

<section class="hero">
  <div>
    <h2>Poudre Violette 5D</h2>
    <p>Blanchiment instantané</p>
    <button class="btn">COMMANDER</button>
  </div>
</section>

<section class="section">
  <h2>Résultat</h2>
  <img src="avant-apres.jpg" style="width:300px;border-radius:10px;">
</section>

<section class="section">
  <h2>Produit</h2>
  <img src="produit.png" class="product">
  <p>19,99€</p>
</section>

</div>

<script>
function enter(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").classList.add("show");
}
</script>

</body>
</html>
